    alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:size*0.36,flexShrink:0,
    boxShadow:`0 2px 6px ${color}44`}}>
    {name?.slice(0,1).toUpperCase()||"?"}
  </div>
);
const Ctr = ({value,onInc,onDec}) => (
  <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
    <button onClick={onDec} disabled={value<=0} style={{width:32,height:32,borderRadius:8,
      border:`2px solid ${value<=0?G.border:G.danger}`,background:G.card,color:value<=0?G.border:G.danger,
      fontWeight:800,cursor:value<=0?"not-allowed":"pointer",fontSize:"1.1rem"}}>−</button>
    <span style={{fontWeight:800,fontSize:"1rem",color:G.primary,minWidth:30,textAlign:"center"}}>{value}</span>
    <button onClick={onInc} style={{width:32,height:32,borderRadius:8,border:`2px solid ${G.primary}`,
      background:G.card,color:G.primary,fontWeight:800,cursor:"pointer",fontSize:"1.1rem"}}>+</button>
  </div>
);
const SBadge = ({status,paid}) => {
  const c=paid?{l:"Pagado ✓",bg:G.successBg,fg:G.success}
    :status==="pending"?{l:"Pendiente",bg:G.warnBg,fg:G.warn}
    :status==="delivered"?{l:"Entregado",bg:G.primaryLight,fg:G.primaryDark}
    :{l:"Cancelado",bg:G.dangerBg,fg:G.danger};
  return <span style={{background:c.bg,color:c.fg,fontSize:"0.67rem",fontWeight:700,borderRadius:20,padding:"0.22rem 0.75rem",whiteSpace:"nowrap",border:`1px solid ${c.fg}22`}}>{c.l}</span>;
};
const MNav = ({value,onChange}) => {
  const prev=()=>{const[y,m]=value.split("-").map(Number);onChange(m===1?`${y-1}-12`:`${y}-${String(m-1).padStart(2,"0")}`);};
  const next=()=>{const[y,m]=value.split("-").map(Number);onChange(m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,"0")}`);};
  return (
    <div style={{display:"flex",alignItems:"center",gap:"0.3rem",background:G.primaryLight,borderRadius:20,padding:"0.3rem 0.6rem",border:`1px solid ${G.primaryMid}`}}>
      <button onClick={prev} style={{background:"none",border:"none",cursor:"pointer",color:G.primaryDark,fontWeight:800,fontSize:"1rem",lineHeight:1}}><IcoChevL s={16} c={G.primaryDark}/></button>
      <span style={{fontSize:"0.82rem",fontWeight:700,color:G.primaryDark,minWidth:60,textAlign:"center"}}>{mLbl(value)}</span>
      <button onClick={next} style={{background:"none",border:"none",cursor:"pointer",color:G.primaryDark,fontWeight:800,fontSize:"1rem",lineHeight:1}}><IcoChevR s={16} c={G.primaryDark}/></button>
    </div>
  );
};

// ── LOGIN ─────────────────────────────────────────────────────

    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",

            <div style={{position:"absolute",left:"0.85rem",top:"50%",transform:"translateY(-50%)"}}><Ico d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" size={18} color={G.sub}/></div>

// ── DASHBOARD ─────────────────────────────────────────────────
function Dashboard({inventory,orders,clients,products}) {
  const year=new Date().getFullYear();
  const allDel=orders.filter(o=>o.status==="delivered");
  const yDel=allDel.filter(o=>o.month&&o.month.startsWith(String(year)));
  const annRev=yDel.reduce((a,o)=>a+o.total,0);
  const annUnp=yDel.filter(o=>!o.paid).reduce((a,o)=>a+o.total,0);
  const annCob=yDel.filter(o=>o.paid).reduce((a,o)=>a+o.total,0);
  const pend=orders.filter(o=>o.status==="pending").length;
  const stock=Object.values(inventory).reduce((a,b)=>a+b,0);
  const months=Array.from({length:12},(_,i)=>{
    const mk=`${year}-${String(i+1).padStart(2,"0")}`;
    const rev=orders.filter(o=>o.status==="delivered"&&o.month===mk).reduce((a,o)=>a+o.total,0);
    return{mk,label:["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][i+1],rev};
  });
  const maxRev=Math.max(...months.map(m=>m.rev),1);
  const curMo=new Date().toISOString().slice(0,7);
  const ps={};allDel.forEach(o=>o.items.forEach(({productId,packs})=>{ps[productId]=(ps[productId]||0)+packs;}));
  const topP=Object.entries(ps).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const bc={};allDel.forEach(o=>{bc[o.clientId]=(bc[o.clientId]||0)+o.total;});
  const topB=Object.entries(bc).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxP=topP[0]?.[1]||1, maxB=topB[0]?.[1]||1;
  return(
    <div>
      <h2 style={{margin:"0 0 1.2rem",fontWeight:900,fontSize:"1.3rem",color:G.text}}>Resumen {year}</h2>
      <div style={{background:`linear-gradient(135deg,${G.primary},${G.primaryDark})`,borderRadius:20,padding:"1.5rem",marginBottom:"1rem",color:"white",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",right:-20,top:-20,opacity:0.1}}><IcoLeaf s={120} c="white"/></div>
        <div style={{fontSize:"0.74rem",opacity:0.8,fontWeight:700,marginBottom:4,letterSpacing:1}}>FACTURADO {year}</div>
        <div style={{fontSize:"2.3rem",fontWeight:900,letterSpacing:"-1.5px"}}>{fmt(annRev)}</div>
        <div style={{display:"flex",gap:"1.5rem",marginTop:"1rem",paddingTop:"0.8rem",borderTop:"1px solid rgba(255,255,255,0.2)"}}>
          <div><div style={{opacity:.7,fontSize:"0.7rem",fontWeight:600}}>COBRADO</div><div style={{fontWeight:800,fontSize:"1.05rem"}}>{fmt(annCob)}</div></div>
          <div><div style={{opacity:.7,fontSize:"0.7rem",fontWeight:600}}>PENDIENTE</div><div style={{fontWeight:800,fontSize:"1.05rem",color:"#FFE066"}}>{fmt(annUnp)}</div></div>
          <div><div style={{opacity:.7,fontSize:"0.7rem",fontWeight:600}}>PEDIDOS</div><div style={{fontWeight:800,fontSize:"1.05rem"}}>{yDel.length}</div></div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.7rem",marginBottom:"1.1rem"}}>
        {[{icon:<IcoBox s={22} c={G.primary}/>,label:"Productos en stock",value:stock,bg:G.primaryLight,color:G.primary},
          {icon:<IcoClip s={22} c={G.warn}/>,label:"Por entregar",value:pend,bg:G.warnBg,color:G.warn},
          {icon:<IcoUsers s={22} c={G.success}/>,label:"Clientes",value:clients.length,bg:G.successBg,color:G.success},
          {icon:<IcoCash s={22} c={G.danger}/>,label:"Deuda año",value:fmt(annUnp),bg:G.dangerBg,color:G.danger},
        ].map((s,i)=>(
          <div key={i} style={{background:s.bg,borderRadius:16,padding:"1rem",border:`1px solid ${s.color}22`}}>
            <div style={{marginBottom:"0.4rem"}}>{s.icon}</div>
            <div style={{fontWeight:800,fontSize:"1.05rem",color:s.color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.value}</div>
            <div style={{fontSize:"0.69rem",color:G.sub,marginTop:2,fontWeight:600}}>{s.label}</div>
          </div>
        ))}
      </div>
      <Card>
        <ST>📊 Ventas mensuales {year}</ST>
        <div style={{display:"flex",alignItems:"flex-end",gap:"3px",height:80,marginBottom:"0.5rem"}}>
          {months.map(m=>{
            const h=m.rev>0?Math.max(8,Math.round(m.rev/maxRev*72)):4;
            const isCur=m.mk===curMo;
            return(<div key={m.mk} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <div style={{width:"100%",height:h,borderRadius:"4px 4px 0 0",background:isCur?G.primary:m.rev>0?G.primaryMid:G.border}}/>
              <div style={{fontSize:"0.5rem",color:isCur?G.primary:G.sub,fontWeight:isCur?800:400}}>{m.label}</div>
            </div>);
          })}
        </div>
        {annRev===0&&<div style={{textAlign:"center",color:G.sub,fontSize:"0.78rem"}}>Sin ventas aún</div>}
      </Card>
      {topP.length>0&&(<Card>
        <ST>🥗 Productos más vendidos</ST>
        {topP.map(([pid,packs],i)=>{const p=products.find(x=>x.id===pid);return(
          <div key={pid} style={{display:"flex",alignItems:"center",gap:"0.65rem",marginBottom:"0.5rem"}}>
            <div style={{width:20,height:20,borderRadius:"50%",background:i===0?G.primary:i===1?G.primaryMid:G.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.6rem",fontWeight:800,color:i<2?"white":G.sub,flexShrink:0}}>{i+1}</div>
            <span style={{fontSize:"1.2rem"}}>{p?.emoji||"🥗"}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:"0.82rem",color:G.text}}>{p?.name||pid}</div>
              <div style={{height:5,background:G.border,borderRadius:10,marginTop:3}}>
                <div style={{height:5,background:`linear-gradient(90deg,${G.primary},${G.success})`,borderRadius:10,width:`${Math.round(packs/maxP*100)}%`}}/>
              </div>
            </div>
            <span style={{fontSize:"0.76rem",fontWeight:800,color:G.primaryDark,background:G.primaryLight,padding:"0.15rem 0.5rem",borderRadius:8,whiteSpace:"nowrap"}}>{packs} paq</span>
          </div>
        );})}
      </Card>)}
      {topB.length>0&&(<Card>
        <ST>👑 Mejores compradores</ST>
        {topB.map(([cid,total],i)=>{const cl=clients.find(c=>c.id===cid);return(
          <div key={cid} style={{display:"flex",alignItems:"center",gap:"0.7rem",marginBottom:"0.55rem"}}>
            <div style={{width:20,height:20,borderRadius:"50%",background:i===0?"#FFB946":i===1?"#9E9E9E":i===2?"#CD7F32":G.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.6rem",fontWeight:800,color:i<3?"white":G.sub,flexShrink:0}}>{i+1}</div>
            <Av name={cl?.name} color={cl?.color||G.primary} size={32}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:"0.82rem",color:G.text}}>{cl?.name||"?"}</div>
              <div style={{height:5,background:G.border,borderRadius:10,marginTop:3}}>
                <div style={{height:5,background:`linear-gradient(90deg,${G.warn},${G.primary})`,borderRadius:10,width:`${Math.round(total/maxB*100)}%`}}/>
              </div>
            </div>
            <span style={{fontSize:"0.76rem",fontWeight:800,color:G.primaryDark,background:G.primaryLight,padding:"0.15rem 0.5rem",borderRadius:8,whiteSpace:"nowrap"}}>{fmt(total)}</span>
          </div>
        );})}
      </Card>)}
      {topP.length===0&&<Card><div style={{textAlign:"center",color:G.sub,padding:"1.5rem"}}><div style={{fontSize:"2rem",marginBottom:"0.5rem"}}>🌱</div>Sin ventas registradas aún</div></Card>}
    </div>
  );
}

// ── CATÁLOGO ──────────────────────────────────────────────────
function Catalogo({products,setProducts}) {
  const [eid,setEid]=useState(null); const [sNew,setSNew]=useState(false);
  const [sEmo,setSEmo]=useState(false);
  const [form,setForm]=useState({name:"",emoji:"🥗",price:14000,active:true});
  const openE=p=>{setForm({...p});setEid(p.id);setSNew(false);setSEmo(false);};
  const openN=()=>{setForm({name:"",emoji:"🥗",price:14000,active:true});setEid(null);setSNew(true);setSEmo(false);};
  const cancel=()=>{setEid(null);setSNew(false);setSEmo(false);};
  const save=()=>{
    if(!form.name.trim())return alert("Nombre obligatorio");
    if(eid)setProducts(p=>p.map(x=>x.id===eid?{...form,id:eid}:x));
    else setProducts(p=>[...p,{...form,id:uid()}]);
    cancel();
  };
  const toggle=id=>setProducts(p=>p.map(x=>x.id===id?{...x,active:!x.active}:x));
  const del=id=>{if(confirm("¿Eliminar producto?"))setProducts(p=>p.filter(x=>x.id!==id));};
  return (
    <div>
      <ST action={<Btn small onClick={openN} icon={<IcoPlus s={14} c="white"/>}>Nuevo</Btn>}>🛒 Catálogo de Productos</ST>
      {(eid||sNew)&&(
        <Card style={{background:G.primaryLight,border:`1.5px solid ${G.primary}`}}>
          <div style={{fontWeight:800,color:G.primaryDark,marginBottom:"0.7rem",fontSize:"0.9rem"}}>{eid?"✏️ Editar":"✨ Nuevo"} producto</div>
          <div style={{display:"flex",gap:"0.5rem",marginBottom:"0.65rem",alignItems:"center"}}>
            <button onClick={()=>setSEmo(!sEmo)} style={{fontSize:"1.8rem",background:G.card,border:`1.5px solid ${G.border}`,borderRadius:12,padding:"0.4rem 0.65rem",cursor:"pointer",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>{form.emoji}</button>
            <input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Nombre del producto *" style={{...iSt,flex:1}}/>
          </div>
          {sEmo&&(
            <div style={{background:G.card,borderRadius:12,padding:"0.75rem",marginBottom:"0.7rem",display:"flex",flexWrap:"wrap",gap:"0.4rem",border:`1px solid ${G.border}`,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
              {EMOJI_LIST.map(e=>(
                <button key={e} onClick={()=>{setForm(p=>({...p,emoji:e}));setSEmo(false);}}
                  style={{background:form.emoji===e?G.primaryLight:"none",border:`1px solid ${form.emoji===e?G.primary:G.border}`,borderRadius:8,padding:"0.3rem 0.4rem",cursor:"pointer",fontSize:"1.2rem"}}>{e}</button>
              ))}
            </div>
          )}
          <label style={{fontSize:"0.71rem",fontWeight:700,color:G.sub,display:"block",marginBottom:4,letterSpacing:0.5}}>PRECIO POR PAQUETE (COP)</label>
          <input type="number" value={form.price} onChange={e=>setForm(p=>({...p,price:+e.target.value}))} style={{...iSt,marginBottom:"0.8rem"}}/>
          <div style={{display:"flex",gap:"0.5rem"}}>
            <Btn onClick={save} color={G.primary}>Guardar</Btn>
            <Btn outline color={G.sub} onClick={cancel}>Cancelar</Btn>
          </div>
        </Card>
      )}
      {products.map(p=>(
        <Card key={p.id} style={{opacity:p.active?1:0.5,padding:"0.8rem 1rem"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",gap:"0.75rem",alignItems:"center",flex:1}}>
              <div style={{width:48,height:48,borderRadius:12,background:G.primaryLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.7rem",border:`1px solid ${G.primaryMid}`}}>{p.emoji}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:G.text,fontSize:"0.9rem"}}>{p.name}</div>
                <div style={{fontSize:"0.7rem",color:G.sub,marginTop:2}}>{fmt(p.price)}/paq · {UNITS} unidades · producto</div>
              </div>
            </div>
            <div style={{display:"flex",gap:"0.4rem",alignItems:"center"}}>
              <button onClick={()=>toggle(p.id)} style={{background:p.active?G.successBg:G.border,border:`1px solid ${p.active?G.success:G.sub}`,borderRadius:20,padding:"0.22rem 0.7rem",fontSize:"0.67rem",fontWeight:700,color:p.active?G.success:G.sub,cursor:"pointer",fontFamily:"inherit"}}>{p.active?"Activo":"Inactivo"}</button>
              <button onClick={()=>openE(p)} style={{background:"none",border:"none",cursor:"pointer",padding:"0.2rem"}}><IcoEdit s={17} c={G.sub}/></button>
              <button onClick={()=>del(p.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"0.2rem"}}><IcoTrash s={17} c={G.danger}/></button>
            </div>
          </div>
        </Card>
      ))}
    </div>
  );
}

// ── INVENTARIO ────────────────────────────────────────────────
function Inventario({inventory,setInventory,products}) {
  const [local,setLocal]=useState({...inventory}); const [saved,setSaved]=useState(false);
  const ch=(id,d)=>{setLocal(p=>({...p,[id]:Math.max(0,(p[id]||0)+d)}));setSaved(false);};
  const save=()=>{setInventory(local);setSaved(true);setTimeout(()=>setSaved(false),2200);};
  const active=products.filter(p=>p.active);
  const val=Object.entries(local).reduce((a,[id,q])=>{const p=products.find(x=>x.id===id);return a+q*(p?.price||0);},0);
  return (
    <div>
      <ST>📦 Inventario de Producción</ST>
      <Card style={{background:`linear-gradient(135deg,${G.primaryLight},${G.card})`,border:`1px solid ${G.primaryMid}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:"0.71rem",color:G.primaryDark,fontWeight:700,letterSpacing:0.5}}>VALOR EN STOCK</div>
            <div style={{fontWeight:900,fontSize:"1.5rem",color:G.primary,marginTop:2}}>{fmt(val)}</div>
            <div style={{fontSize:"0.7rem",color:G.sub,marginTop:2}}>{Object.values(local).reduce((a,b)=>a+b,0)} productos</div>
          </div>
          <IcoLeaf s={48} c={G.primary}/>
        </div>
      </Card>
      {active.map(p=>(
        <Card key={p.id} style={{padding:"0.8rem 1rem"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",gap:"0.75rem",alignItems:"center",flex:1}}>
              <div style={{width:44,height:44,borderRadius:12,background:G.primaryLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.5rem",border:`1px solid ${G.primaryMid}`}}>{p.emoji}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:G.text,fontSize:"0.88rem"}}>{p.name}</div>
                <div style={{fontSize:"0.69rem",color:G.sub,marginTop:2}}>{local[p.id]||0} productos · {(local[p.id]||0)*UNITS} unidades · {fmt((local[p.id]||0)*p.price)}</div>
              </div>
            </div>
            <Ctr value={local[p.id]||0} onInc={()=>ch(p.id,1)} onDec={()=>ch(p.id,-1)}/>
          </div>
        </Card>
      ))}
      <Btn onClick={save} full color={saved?G.success:G.primary}
        icon={saved?<IcoCheck s={16} c="white"/>:null}>
        {saved?"Inventario actualizado":"Guardar Inventario"}
      </Btn>
    </div>
  );
}

// ── CLIENTES ──────────────────────────────────────────────────
function Clientes({clients,setClients,orders}) {
  const [sf,setSF]=useState(false);
  const [form,setForm]=useState({name:"",phone:"",color:CLIENT_COLORS[0]});
  const add=()=>{if(!form.name.trim())return;setClients(p=>[...p,{id:uid(),...form,name:form.name.trim(),createdAt:today()}]);setForm({name:"",phone:"",color:CLIENT_COLORS[Math.floor(Math.random()*CLIENT_COLORS.length)]});setSF(false);};
  const del=id=>{if(confirm("¿Eliminar cliente?"))setClients(p=>p.filter(c=>c.id!==id));};
  const debt=id=>orders.filter(o=>o.clientId===id&&o.status==="delivered"&&!o.paid).reduce((a,o)=>a+o.total,0);
  const orderCount=id=>orders.filter(o=>o.clientId===id&&o.status==="delivered").length;
  return (
    <div>
      <ST action={<Btn small onClick={()=>setSF(!sf)} icon={<IcoPlus s={14} c="white"/>}>Cliente</Btn>}>👥 Clientes</ST>
      {sf&&(
        <Card style={{background:G.primaryLight,border:`1.5px solid ${G.primary}`}}>
          <input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Nombre *" style={{...iSt,marginBottom:"0.6rem"}}/>
          <input value={form.phone} onChange={e=>setForm(p=>({...p,phone:e.target.value}))} placeholder="Teléfono WhatsApp" style={{...iSt,marginBottom:"0.6rem"}} type="tel"/>
          <div style={{display:"flex",gap:"0.5rem",marginBottom:"0.8rem",flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:"0.72rem",color:G.sub,fontWeight:700}}>COLOR:</span>
            {CLIENT_COLORS.map(cl=><button key={cl} onClick={()=>setForm(p=>({...p,color:cl}))} style={{width:28,height:28,borderRadius:"50%",background:cl,border:`3px solid ${form.color===cl?"#1A1D2E":"transparent"}`,cursor:"pointer",boxShadow:`0 2px 4px ${cl}55`}}/>)}
          </div>
          <div style={{display:"flex",gap:"0.5rem"}}><Btn onClick={add} color={G.primary}>Guardar</Btn><Btn outline color={G.sub} onClick={()=>setSF(false)}>Cancelar</Btn></div>
        </Card>
      )}
      {clients.length===0
        ?<Card><div style={{textAlign:"center",color:G.sub,padding:"1.5rem",fontSize:"0.84rem"}}><div style={{fontSize:"2rem",marginBottom:"0.5rem"}}>🌱</div>Sin clientes registrados.</div></Card>
        :clients.map(c=>{const d=debt(c.id); const oc=orderCount(c.id);return(
          <Card key={c.id} style={{padding:"0.85rem 1rem"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",gap:"0.8rem",alignItems:"center"}}>
                <Av name={c.name} color={c.color||G.primary} size={44}/>
                <div>
                  <div style={{fontWeight:700,color:G.text,fontSize:"0.95rem"}}>{c.name}</div>
                  {c.phone&&<div style={{fontSize:"0.71rem",color:G.sub,marginTop:1}}>📱 {c.phone}</div>}
                  <div style={{display:"flex",gap:"0.5rem",marginTop:3}}>
                    {d>0&&<span style={{fontSize:"0.67rem",color:G.danger,fontWeight:700,background:G.dangerBg,padding:"0.1rem 0.5rem",borderRadius:10}}>Deuda: {fmt(d)}</span>}
                    <span style={{fontSize:"0.67rem",color:G.sub,background:"#F5F5F5",padding:"0.1rem 0.5rem",borderRadius:10}}>{oc} entregas</span>
                  </div>
                </div>
              </div>
              <button onClick={()=>del(c.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"0.3rem"}}><IcoTrash s={18} c={G.danger}/></button>
            </div>
          </Card>
        );})}
    </div>
  );
}

// ── PEDIDOS ───────────────────────────────────────────────────
function Pedidos({clients,orders,setOrders,inventory,setInventory,products,currentMonth}) {
  const zI=()=>Object.fromEntries(products.filter(p=>p.active).map(p=>[p.id,0]));
  const [tab,setTab]=useState("nuevo"); const [cid,setCid]=useState(""); const [dd,setDd]=useState(today()); const [items,setItems]=useState(zI());
  const [showNewCl,setShowNewCl]=useState(false); const [newClName,setNewClName]=useState(""); const [newClPhone,setNewClPhone]=useState("");
  const total=Object.entries(items).reduce((a,[id,q])=>{const p=products.find(x=>x.id===id);return a+q*(p?.price||0);},0);
  const qty=(id,d)=>setItems(p=>({...p,[id]:Math.max(0,(p[id]||0)+d)}));
  const create=()=>{
    if(!cid)return alert("Selecciona un cliente");
    const ls=Object.entries(items).filter(([,q])=>q>0).map(([productId,packs])=>{const p=products.find(x=>x.id===productId);return{productId,packs,unitPrice:p?.price||0};});
    if(ls.length===0)return alert("Agrega al menos un producto");
    setOrders(p=>[{id:uid(),clientId:cid,items:ls,deliveryDate:dd,month:mKey(dd),status:"pending",total,paid:false,createdAt:today()},...p]);
    setItems(zI());setCid("");setTab("pendientes");
  };
  const deliver=oid=>{
    const o=orders.find(x=>x.id===oid);if(!o)return;
    const ni={...inventory};o.items.forEach(({productId,packs})=>{ni[productId]=Math.max(0,(ni[productId]||0)-packs);});
    setInventory(ni);setOrders(p=>p.map(x=>x.id===oid?{...x,status:"delivered",deliveredAt:today()}:x));
  };
  const cancel=oid=>{if(confirm("¿Cancelar pedido?"))setOrders(p=>p.map(x=>x.id===oid?{...x,status:"cancelled"}:x));};
  const pend=orders.filter(o=>o.status==="pending");
  const moDel=orders.filter(o=>o.status==="delivered"&&o.month===currentMonth);
  const Tab=({id,label,cnt})=>(
    <button onClick={()=>setTab(id)} style={{flex:1,padding:"0.6rem",border:"none",borderBottom:`3px solid ${tab===id?G.primary:"transparent"}`,background:"none",fontWeight:tab===id?800:500,color:tab===id?G.primary:G.sub,cursor:"pointer",fontSize:"0.78rem",fontFamily:"inherit",transition:"color .15s"}}>
      {label}{cnt>0&&<span style={{marginLeft:5,background:G.primary,color:"white",borderRadius:20,padding:"0.05rem 0.45rem",fontSize:"0.61rem"}}>{cnt}</span>}
    </button>
  );
  return (
    <div>
      <ST>📋 Pedidos</ST>
      <div style={{display:"flex",borderBottom:`1.5px solid ${G.border}`,marginBottom:"1rem"}}>
        <Tab id="nuevo" label="Nuevo" cnt={0}/><Tab id="pendientes" label="Pendientes" cnt={pend.length}/><Tab id="entregados" label="Entregados" cnt={moDel.length}/>
      </div>
      {tab==="nuevo"&&(
        <div>
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
              <label style={{fontSize:"0.71rem",fontWeight:700,color:G.sub,letterSpacing:0.5}}>CLIENTE</label>
              <button onClick={()=>setShowNewCl(p=>!p)} style={{background:"none",border:`1px solid ${G.primary}`,color:G.primary,borderRadius:8,padding:"0.15rem 0.5rem",fontSize:"0.68rem",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>+ Nuevo cliente</button>
            </div>
            {showNewCl&&(
              <div style={{background:G.primaryLight,borderRadius:12,padding:"0.8rem",marginBottom:"0.7rem",border:`1px solid ${G.primary}`}}>
                <input value={newClName} onChange={e=>setNewClName(e.target.value)} placeholder="Nombre del cliente *" style={{...iSt,marginBottom:"0.5rem"}}/>
                <input value={newClPhone} onChange={e=>setNewClPhone(e.target.value)} placeholder="Teléfono WhatsApp" style={{...iSt,marginBottom:"0.6rem"}} type="tel"/>
                <div style={{display:"flex",gap:"0.4rem"}}>
                  <Btn small onClick={()=>{if(!newClName.trim())return;const nc={id:uid(),name:newClName.trim(),phone:newClPhone.trim(),color:CLIENT_COLORS[Math.floor(Math.random()*CLIENT_COLORS.length)],createdAt:today()};setClients(p=>[...p,nc]);setCid(nc.id);setNewClName("");setNewClPhone("");setShowNewCl(false);}} color={G.primary}>Guardar y seleccionar</Btn>
                  <Btn small outline color={G.sub} onClick={()=>setShowNewCl(false)}>Cancelar</Btn>
                </div>
              </div>
            )}
            <select value={cid} onChange={e=>setCid(e.target.value)} style={{...iSt,marginBottom:"0.9rem"}}>
              <option value="">Seleccionar cliente...</option>
              {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
            <label style={{fontSize:"0.71rem",fontWeight:700,color:G.sub,display:"block",marginBottom:5,letterSpacing:0.5}}>FECHA DE ENTREGA</label>
            <input type="date" value={dd} onChange={e=>setDd(e.target.value)} style={iSt}/>
          </Card>
          {products.filter(p=>p.active).map(p=>(
            <Card key={p.id} style={{padding:"0.8rem 1rem"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",gap:"0.75rem",alignItems:"center",flex:1}}>
                  <div style={{width:42,height:42,borderRadius:10,background:G.primaryLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.4rem"}}>{p.emoji}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,color:G.text,fontSize:"0.87rem"}}>{p.name}</div>
                    <div style={{fontSize:"0.69rem",color:G.sub,marginTop:1}}>Stock: {inventory[p.id]||0} productos · {fmt(p.price)}/paq</div>
                  </div>
                </div>
                <Ctr value={items[p.id]||0} onInc={()=>qty(p.id,1)} onDec={()=>qty(p.id,-1)}/>
              </div>
            </Card>
          ))}
          <Card style={{background:G.warnBg,border:`1px solid ${G.warn}55`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontWeight:700,color:G.warn,fontSize:"0.9rem"}}>Total del pedido</span>
              <span style={{fontWeight:900,fontSize:"1.4rem",color:G.warn}}>{fmt(total)}</span>
            </div>
          </Card>
          <Btn onClick={create} full disabled={total===0||!cid} color={G.primary}>Registrar Pedido →</Btn>
        </div>
      )}
      {tab==="pendientes"&&(
        pend.length===0?<Card><div style={{textAlign:"center",color:G.sub,padding:"1.5rem"}}><div style={{fontSize:"2rem"}}>🌿</div>Sin pedidos pendientes 🎉</div></Card>
        :pend.map(o=><OrdCard key={o.id} o={o} clients={clients} products={products} onDeliver={()=>deliver(o.id)} onCancel={()=>cancel(o.id)} showActions/>)
      )}
      {tab==="entregados"&&(
        moDel.length===0?<Card><div style={{textAlign:"center",color:G.sub,padding:"1.5rem"}}><div style={{fontSize:"2rem"}}>🌱</div>Sin entregas en {mLbl(currentMonth)}</div></Card>
        :moDel.map(o=><OrdCard key={o.id} o={o} clients={clients} products={products}/>)
      )}
    </div>
  );
}
function OrdCard({o,clients,products,onDeliver,onCancel,showActions}) {
  const cl=clients.find(c=>c.id===o.clientId);
  return(
    <Card style={{padding:"0.85rem 1rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:"0.4rem"}}>
        <div style={{display:"flex",gap:"0.65rem",alignItems:"center"}}><Av name={cl?.name} color={cl?.color||G.primary} size={36}/><div style={{fontWeight:700,color:G.text,fontSize:"0.87rem"}}>{cl?.name||"?"}</div></div>
        <SBadge status={o.status} paid={o.paid}/>
      </div>
      <div style={{fontSize:"0.73rem",color:G.sub,marginBottom:"0.35rem",paddingLeft:44}}>📅 {o.deliveryDate} · 💰 {fmt(o.total)}</div>
      <div style={{fontSize:"0.71rem",color:G.sub,marginBottom:showActions?"0.75rem":0,paddingLeft:44}}>
        {o.items.map(it=>{const p=products.find(x=>x.id===it.productId);return `${p?.emoji} ${p?.name||it.productId} ×${it.packs}`;}).join(" · ")}
      </div>
      {showActions&&(
        <div style={{display:"flex",gap:"0.5rem",paddingLeft:44}}>
          <Btn small onClick={onDeliver} color={G.success} icon={<IcoCheck s={13} c="white"/>}>Entregar</Btn>
          <Btn small outline color={G.danger} onClick={onCancel}>Cancelar</Btn>
        </div>
      )}
    </Card>
  );
}

// ── COBROS ────────────────────────────────────────────────────
function Cobros({orders,setOrders,clients,products,currentMonth,setCurrentMonth}) {
  const [search,setSearch]=useState("");
  const [waModal,setWaModal]=useState(null); // {cid, cos, tot, msg}

  // Group ALL delivered+unpaid by client (all time, not just month)
  const allUnp=orders.filter(o=>o.status==="delivered"&&!o.paid);
  const allPai=orders.filter(o=>o.paid&&o.month===currentMonth);
  const tDebt=allUnp.reduce((a,o)=>a+o.total,0);
  const tCob=allPai.reduce((a,o)=>a+o.total,0);
  const byC={};
  allUnp.forEach(o=>{(byC[o.clientId]=byC[o.clientId]||[]).push(o);});

  // Clients with debt, filtered by search
  const debtClients = Object.entries(byC)
    .map(([cid,cos])=>({cid,cos,tot:cos.reduce((a,o)=>a+o.total,0)}))
    .sort((a,b)=>b.tot-a.tot)
    .filter(({cid})=>{
      const cl=clients.find(c=>c.id===cid);
      return !search||cl?.name?.toLowerCase().includes(search.toLowerCase());
    });

  const markP=id=>setOrders(p=>p.map(o=>o.id===id?{...o,paid:true,paidAt:today()}:o));
  const markAll=cid=>setOrders(p=>p.map(o=>o.clientId===cid&&!o.paid?{...o,paid:true,paidAt:today()}:o));

  const openWA = cid => {
    const cl=clients.find(c=>c.id===cid);
    const cos=byC[cid]||[];
    const tot=cos.reduce((a,o)=>a+o.total,0);
    const greeting=rMsg(cl?.name||"");
    const lines=[greeting+"\n",
      `📅 *Período: ${mLbl(currentMonth)}*\n`,
      ...cos.flatMap(o=>[`📦 Entrega: ${o.deliveryDate}`,...o.items.map(it=>{
        const p=products.find(x=>x.id===it.productId);
        return `  ${p?.emoji} ${p?.name}: ${it.packs} paq × ${fmt(it.packs*(p?.price||0))}`;
      })]),
      `\n💰 *Total a pagar: ${fmt(tot)}*`,
      `\n✅ Escanea el QR adjunto para pagar (Nequi / Bancolombia / A la mano) 🙏`,
      `\n_Salud & Sabor by María C._ 🌿`];
    const msg=lines.join("\n");
    setWaModal({cid, cos, tot, msg, cl});
  };

  const sendWA = () => {
    if(!waModal) return;
    const msg=encodeURIComponent(waModal.msg);
    const num=waModal.cl?.phone?.replace(/\D/g,"");
    window.open(num?`https://wa.me/57${num}?text=${msg}`:`https://wa.me/?text=${msg}`,"_blank");
  };

  const copyMsg = () => {
    if(!waModal) return;
    navigator.clipboard?.writeText(waModal.msg).then(()=>alert("Mensaje copiado ✓"));
  };

  return(
    <div>
      {/* WhatsApp + QR Modal */}
      {waModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:999,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setWaModal(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:G.card,borderRadius:"24px 24px 0 0",padding:"1.5rem 1.2rem",width:"100%",maxWidth:500,maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{width:40,height:4,background:G.border,borderRadius:2,margin:"0 auto 1.2rem"}}/>
            <div style={{fontWeight:800,color:G.text,fontSize:"1rem",marginBottom:"0.3rem"}}>📱 Cobro a {waModal.cl?.name}</div>
            <div style={{fontWeight:900,fontSize:"1.3rem",color:G.danger,marginBottom:"1rem"}}>{fmt(waModal.tot)}</div>

            {/* QR */}
            <div style={{background:"#1A1A2E",borderRadius:16,padding:"1rem",textAlign:"center",marginBottom:"1rem"}}>
              <div style={{fontSize:"0.72rem",color:"rgba(255,255,255,0.6)",marginBottom:"0.6rem",letterSpacing:1}}>QR DE PAGO · ENVIAR JUNTO AL MENSAJE</div>
              <img src={QR_IMG} alt="QR Pago" style={{width:"100%",maxWidth:260,borderRadius:10,display:"block",margin:"0 auto"}}/>
              <div style={{color:"rgba(255,255,255,0.5)",fontSize:"0.67rem",marginTop:"0.5rem"}}>Bancolombia · Redeban · Nequi · A la mano</div>
            </div>

            {/* Message preview */}
            <div style={{background:G.primaryLight,borderRadius:12,padding:"0.85rem",marginBottom:"1rem",border:`1px solid ${G.primaryMid}`,fontSize:"0.78rem",color:G.text,lineHeight:1.6,whiteSpace:"pre-wrap",maxHeight:150,overflowY:"auto"}}>
              {waModal.msg}
            </div>

            <div style={{fontSize:"0.75rem",color:G.sub,marginBottom:"1rem",background:G.warnBg,padding:"0.6rem 0.8rem",borderRadius:10,border:`1px solid ${G.warn}44`}}>
              💡 <b>Pasos:</b> 1) Abre WhatsApp → el mensaje se enviará automáticamente. 2) Luego envía también la imagen del QR desde tu galería.
            </div>

            <div style={{display:"flex",gap:"0.6rem",flexDirection:"column"}}>
              <Btn onClick={sendWA} full color="#25D366" icon={<IcoWA s={17}/>}>Abrir WhatsApp con mensaje</Btn>
              <Btn onClick={copyMsg} full outline color={G.primary}>📋 Copiar mensaje</Btn>
              <Btn onClick={()=>setWaModal(null)} full outline color={G.sub}>Cerrar</Btn>
            </div>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.75rem"}}>
        <div style={{fontWeight:800,color:G.text,fontSize:"1rem"}}>💰 Cobros</div>
        <MNav value={currentMonth} onChange={setCurrentMonth}/>
      </div>

      {/* Summary */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.7rem",marginBottom:"1rem"}}>
        <div style={{background:G.dangerBg,borderRadius:16,padding:"1rem",border:`1px solid ${G.danger}22`}}>
          <div style={{fontSize:"0.7rem",color:G.danger,fontWeight:700,marginBottom:2}}>TOTAL PENDIENTE</div>
          <div style={{fontWeight:900,fontSize:"1.3rem",color:G.danger}}>{fmt(tDebt)}</div>
          <div style={{fontSize:"0.67rem",color:G.sub}}>{debtClients.length} personas</div>
        </div>
        <div style={{background:G.successBg,borderRadius:16,padding:"1rem",border:`1px solid ${G.success}22`}}>
          <div style={{fontSize:"0.7rem",color:G.success,fontWeight:700,marginBottom:2}}>COBRADO ({mLbl(currentMonth)})</div>
          <div style={{fontWeight:900,fontSize:"1.3rem",color:G.success}}>{fmt(tCob)}</div>
          <div style={{fontSize:"0.67rem",color:G.sub}}>{allPai.length} pagos</div>
        </div>
      </div>

      {/* Search */}
      <div style={{position:"relative",marginBottom:"1rem"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Buscar persona..." style={{...iSt,paddingLeft:"2.6rem"}}/>
        <div style={{position:"absolute",left:"0.85rem",top:"50%",transform:"translateY(-50%)"}}>
          <Ico d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" size={17} color={G.sub}/>
        </div>
      </div>

      {/* Debt clients - LucAi style */}
      {debtClients.length===0
        ?<Card><div style={{textAlign:"center",color:G.sub,padding:"1.5rem"}}><div style={{fontSize:"2rem"}}>🌿</div>¡Todo cobrado! 🎉</div></Card>
        :debtClients.map(({cid,cos,tot})=>{
          const cl=clients.find(c=>c.id===cid);
          const allTimeTotal=orders.filter(o=>o.clientId===cid&&o.status==="delivered").reduce((a,o)=>a+o.total,0);
          const paidTotal=orders.filter(o=>o.clientId===cid&&o.paid).reduce((a,o)=>a+o.total,0);
          const pct=allTimeTotal>0?Math.round(paidTotal/allTimeTotal*100):0;
          return(
            <Card key={cid} style={{padding:"0.85rem 1rem"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"0.5rem"}}>
                <div style={{display:"flex",gap:"0.75rem",alignItems:"center",flex:1}}>
                  <Av name={cl?.name} color={cl?.color||G.primary} size={42}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:800,color:G.text,fontSize:"0.95rem"}}>{cl?.name||"?"}</div>
                    <div style={{fontSize:"0.7rem",color:G.sub}}>{cos.length} entrega{cos.length>1?"s":""} sin pagar</div>

                <div style={{textAlign:"right"}}>
                  <div style={{fontWeight:900,fontSize:"1.1rem",color:G.danger}}>{fmt(tot)}</div>
                  {pct>0&&<div style={{fontSize:"0.67rem",color:G.warn,fontWeight:600}}>{pct}% pagado hist.</div>}
                </div>
              </div>
              {/* Progress bar */}
              <div style={{height:4,background:G.border,borderRadius:10,marginBottom:"0.6rem"}}>
                <div style={{height:4,background:G.warn,borderRadius:10,width:`${pct}%`}}/>
              </div>
              {/* Detail orders */}
              {cos.map(o=>(
                <div key={o.id} style={{background:G.bg,borderRadius:10,padding:"0.45rem 0.7rem",marginBottom:"0.3rem",fontSize:"0.73rem",border:`1px solid ${G.border}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{color:G.sub}}>📅 {o.deliveryDate}</span>
                    <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
                      <span style={{fontWeight:700,color:G.text}}>{fmt(o.total)}</span>
                      <button onClick={()=>markP(o.id)} style={{background:"none",border:`1.5px solid ${G.success}`,color:G.success,borderRadius:6,padding:"0.15rem 0.5rem",fontSize:"0.65rem",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>✓ Pago</button>
                    </div>
                  </div>
                  <div style={{color:G.sub,marginTop:2}}>{o.items.map(it=>{const p=products.find(x=>x.id===it.productId);return `${p?.emoji}×${it.packs}`;}).join("  ")}</div>
                </div>
              ))}
              {/* Pendiente + CTA */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"0.6rem",paddingTop:"0.5rem",borderTop:`1px solid ${G.border}`}}>
                <div style={{fontSize:"0.72rem",color:G.sub}}>Pendiente: <b style={{color:G.danger}}>{fmt(tot)}</b></div>
                <div style={{display:"flex",gap:"0.45rem"}}>
                  <Btn small onClick={()=>markAll(cid)} color={G.success} icon={<IcoCheck s={12} c="white"/>}>Todo pagado</Btn>
                  <Btn small onClick={()=>openWA(cid)} color="#25D366" icon={<IcoWA s={14}/>}>Cobrar</Btn>
                </div>
              </div>
            </Card>
          );
        })}

      {/* Paid history */}
      {allPai.length>0&&(
        <div style={{marginTop:"1rem"}}>
          <ST>✅ Pagados en {mLbl(currentMonth)}</ST>
          {allPai.slice(0,6).map(o=>{const cl=clients.find(c=>c.id===o.clientId);return(
            <Card key={o.id} style={{padding:"0.7rem 1rem"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",gap:"0.6rem",alignItems:"center"}}><Av name={cl?.name} color={cl?.color||G.primary} size={32}/><div><div style={{fontWeight:700,fontSize:"0.84rem",color:G.text}}>{cl?.name}</div><div style={{fontSize:"0.68rem",color:G.sub}}>Pagado: {o.paidAt}</div></div></div>
                <div style={{fontWeight:700,color:G.success}}>{fmt(o.total)}</div>
              </div>
            </Card>
          );})}
        </div>
      )}
    </div>
  );
}

// ── BOTTOM NAV ────────────────────────────────────────────────
function BNav({screen,setScreen,orders}) {
  const pend=orders.filter(o=>o.status==="pending").length;
  const debts=orders.filter(o=>o.status==="delivered"&&!o.paid).length;
  const items=[
    {id:"dashboard", label:"Inicio",    Icon:IcoHome},
    {id:"pedidos",   label:"Pedidos",   Icon:IcoClip,  badge:pend},
    {id:"cobros",    label:"Cobros",    Icon:IcoCash,  badge:debts},
    {id:"inventario",label:"Stock",     Icon:IcoBox},
    {id:"catalogo",  label:"Catálogo",  Icon:IcoStore},
  ];
  return (
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:G.card,borderTop:`1px solid ${G.border}`,display:"flex",justifyContent:"space-around",padding:"0.45rem 0 0.55rem",zIndex:200,boxShadow:"0 -2px 16px rgba(125,194,65,0.1)"}}>
      {items.map(({id,label,Icon,badge})=>(
        <button key={id} onClick={()=>setScreen(id)} style={{display:"flex",flexDirection:"column",alignItems:"center",background:"none",border:"none",cursor:"pointer",padding:"0.15rem 0.3rem",position:"relative",fontFamily:"inherit",minWidth:44}}>
          <div style={{padding:"0.25rem",borderRadius:10,background:screen===id?G.primaryLight:"transparent",transition:"background .15s"}}>
            <Icon s={22} c={screen===id?G.primary:G.sub}/>
          </div>
          <span style={{fontSize:"0.56rem",fontWeight:screen===id?800:500,marginTop:2,color:screen===id?G.primary:G.sub}}>{label}</span>
          {badge>0&&<span style={{position:"absolute",top:0,right:2,background:G.danger,color:"white",borderRadius:"50%",width:15,height:15,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.57rem",fontWeight:800}}>{badge}</span>}
        </button>
      ))}
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────
function App() {
  const [user,setUser]=useState(null); const [screen,setScreen]=useState("dashboard");
  const [products,setProducts]=useState(PRODUCTS_DEFAULT);
  const [inventory,setInventory]=useState(Object.fromEntries(PRODUCTS_DEFAULT.map(p=>[p.id,0])));
  const [clients,setClients]=useState([]); const [orders,setOrders]=useState([]);
  const [currentMonth,setCurrentMonth]=useState(mKey()); const [loaded,setLoaded]=useState(false);
  const fromRemote = React.useRef(false);

  useEffect(()=>{(async()=>{
    const [pr,inv,cl,or]=await Promise.all([db.get("ss4:products"),db.get("ss4:inventory"),db.get("ss4:clients"),db.get("ss4:orders")]);
    fromRemote.current=true;
    if(pr)setProducts(pr); if(inv)setInventory(inv); if(cl)setClients(cl); if(or)setOrders(or);
    setTimeout(()=>{fromRemote.current=false;},100);
    setLoaded(true);
  })();},[]);
  useEffect(()=>{if(loaded&&!fromRemote.current)db.set("ss4:products",products);},[products,loaded]);
  useEffect(()=>{if(loaded&&!fromRemote.current)db.set("ss4:inventory",inventory);},[inventory,loaded]);
  useEffect(()=>{if(loaded&&!fromRemote.current)db.set("ss4:clients",clients);},[clients,loaded]);
  useEffect(()=>{if(loaded&&!fromRemote.current)db.set("ss4:orders",orders);},[orders,loaded]);

  // ── REALTIME: sync entre dispositivos ──────────────────────
  useEffect(()=>{
    if(!loaded) return;
    const ch = supa.channel('ss_sync')
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'ss_data'},
        async ({new:row})=>{
          fromRemote.current=true;
          const v = row.value;
          if(row.key==="ss4:products")  setProducts(v);
          if(row.key==="ss4:inventory") setInventory(v);
          if(row.key==="ss4:clients")   setClients(v);
          if(row.key==="ss4:orders")    setOrders(v);
          setTimeout(()=>{fromRemote.current=false;},100);
        })
      .subscribe();
    return () => supa.removeChannel(ch);
  },[loaded]);

  if(!loaded)return(
    <div style={{display:"flex",height:"100vh",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"0.75rem",background:G.primaryLight}}>
      <Logo size={72}/>
      <div style={{fontWeight:700,color:G.primaryDark,fontSize:"0.95rem"}}>Cargando Salud & Sabor...</div>
    </div>
  );
  if(!user)return <Login onLogin={setUser}/>;

  const props={user,products,setProducts,inventory,setInventory,clients,setClients,orders,setOrders,currentMonth,setCurrentMonth};
  return (
    <div style={{fontFamily:"system-ui,-apple-system,sans-serif",background:G.bg,minHeight:"100vh",paddingBottom:72}}>
      {/* Header */}
      <div style={{background:G.card,padding:"0.75rem 1.1rem",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:150,boxShadow:`0 1px 8px rgba(125,194,65,0.12)`,borderBottom:`1px solid ${G.border}`}}>
        <div style={{display:"flex",alignItems:"center",gap:"0.65rem"}}>
          <Logo size={38}/>
          <div>
            <div style={{fontWeight:900,fontSize:"0.95rem",color:G.text,lineHeight:1.1}}>Salud & Sabor</div>
            <div style={{fontSize:"0.6rem",color:G.sub,letterSpacing:0.5}}>COMIDA SALUDABLE · by María C.</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"0.65rem"}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:user.color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:"0.8rem",boxShadow:`0 2px 6px ${user.color}66`}}>{user.initials}</div>
          <button onClick={()=>{setUser(null);setScreen("dashboard");}} style={{background:"none",border:`1.5px solid ${G.border}`,color:G.sub,borderRadius:20,padding:"0.28rem 0.8rem",cursor:"pointer",fontSize:"0.72rem",fontFamily:"inherit",fontWeight:600}}>Salir</button>
        </div>
      </div>
      <div style={{padding:"1rem",maxWidth:600,margin:"0 auto"}}>
        {screen==="dashboard" &&<Dashboard inventory={inventory} orders={orders} clients={clients} products={products}/>}
        {screen==="inventario"&&<Inventario {...props}/>}
        {screen==="clientes"  &&<Clientes   {...props}/>}
        {screen==="pedidos"   &&<Pedidos    {...props}/>}
        {screen==="cobros"    &&<Cobros     {...props}/>}
        {screen==="catalogo"  &&<Catalogo   {...props}/>}
      </div>
      <BNav screen={screen} setScreen={setScreen} orders={orders}/>
    </div>
  );
}

  
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
